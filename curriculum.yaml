version: "1.0.0"

areas:
  # ============================================================
  # エリア1: はじまりの平原（入門）
  # ============================================================
  - id: "beginning-plains"
    name: "はじまりの平原"
    order: 1
    exp_exercise:
      min: 10
      max: 20
    exp_boss:
      min: 20
      max: 30
    dungeons:

      - id: "C1-01"
        name: "プログラムの構造"
        folder: "C1-01_program-structure"
        skill: "基本構文"
        min_java_version: null
        prerequisites: []
        exp_required: 40
        learning_goals:
          - "Javaプログラムの基本構造（class宣言, mainメソッド）を理解する"
          - "コンパイル（javac）と実行（java）の流れを理解する"
          - "セミコロン・ブロック・インデントの役割を理解する"
        lecture_topics:
          - "なぜJavaのコードはclassの中に書くのか"
          - "mainメソッドの署名（public static void main）の意味"
          - "javac と java コマンドによるコンパイル・実行"
          - "セミコロン・中括弧・インデントの基本ルール"
        exercise_hints:
          - type: "basic"
            theme: "Hello Worldを出力するプログラムを書く"
          - type: "applied"
            theme: "自分の名前と好きなものを複数行で出力する自己紹介プログラム"
        boss_description: "classとmainメソッドの構造を正しく書き、コンパイル・実行できることを問う総合問題"

      - id: "C1-02"
        name: "標準出力"
        folder: "C1-02_standard-output"
        skill: "出力操作"
        min_java_version: null
        prerequisites: ["C1-01"]
        exp_required: 40
        learning_goals:
          - "System.out.println / print / printf の違いと使い分けを理解する"
          - "文字列の連結（+演算子）を使える"
          - "エスケープシーケンス（\\n, \\t等）を使える"
        lecture_topics:
          - "println vs print vs printf"
          - "文字列リテラルとダブルクォート"
          - "文字列の連結（+演算子）"
          - "エスケープシーケンス（\\n, \\t, \\\\, \\\"）"
        exercise_hints:
          - type: "basic"
            theme: "printlnとprintを使い分けて特定のフォーマットで出力する"
          - type: "applied"
            theme: "printfを使って表形式のデータを整形出力する"
        boss_description: "3種類の出力メソッドとエスケープシーケンスを組み合わせた総合出力問題"

      - id: "C1-03"
        name: "変数と型（数値）"
        folder: "C1-03_numeric-types"
        skill: "数値型操作"
        min_java_version: null
        prerequisites: ["C1-02"]
        exp_required: 50
        learning_goals:
          - "int, long, double, float の違いと使い分けを理解する"
          - "変数の宣言・初期化・代入ができる"
          - "型による値の範囲と精度の違いを理解する"
        lecture_topics:
          - "変数とは何か（名前付きの箱）"
          - "整数型（byte, short, int, long）とその範囲"
          - "浮動小数点型（float, double）と精度"
          - "変数の宣言・初期化・代入"
          - "varによる型推論（Java 10以降）"
        exercise_hints:
          - type: "basic"
            theme: "さまざまな数値型の変数を宣言・出力する"
          - type: "applied"
            theme: "日常の数値（年齢、身長、体重など）を適切な型で扱うプログラム"
        boss_description: "数値型の選択・変数操作・型の特性理解を問う総合問題"

      - id: "C1-04"
        name: "変数と型（文字列・真偽値）"
        folder: "C1-04_string-boolean-types"
        skill: "文字列型操作"
        min_java_version: null
        prerequisites: ["C1-03"]
        exp_required: 50
        learning_goals:
          - "String型の基本操作（宣言、連結、length）ができる"
          - "char型とString型の違いを理解する"
          - "boolean型とtrue/falseの概念を理解する"
        lecture_topics:
          - "String型 — 参照型であること、イミュータブルであること"
          - "文字列の連結（+演算子）と基本メソッド（length, charAt）"
          - "char型（シングルクォート）とString型（ダブルクォート）の違い"
          - "boolean型とリテラル（true / false）"
          - "Text Blocks（Java 13以降、複数行文字列）"
        exercise_hints:
          - type: "basic"
            theme: "String, char, booleanの変数を使ったプロフィール表示"
          - type: "applied"
            theme: "文字列の長さや特定文字の取得を組み合わせた情報整形プログラム"
        boss_description: "String・char・booleanの特性と基本操作を問う総合問題"

      - id: "C1-05"
        name: "算術演算・キャスト"
        folder: "C1-05_arithmetic-casting"
        skill: "演算処理"
        min_java_version: null
        prerequisites: ["C1-03"]
        exp_required: 50
        learning_goals:
          - "四則演算（+, -, *, /, %）を正しく使える"
          - "整数同士の除算で小数が切り捨てられることを理解する"
          - "型キャスト（暗黙・明示）の仕組みと注意点を理解する"
        lecture_topics:
          - "四則演算子と剰余演算子（%）"
          - "演算子の優先順位と括弧"
          - "整数除算の罠（5 / 2 = 2）"
          - "暗黙の型変換（widening）と明示的キャスト（narrowing）"
          - "オーバーフローとは何か"
        exercise_hints:
          - type: "basic"
            theme: "いくつかの計算式の結果を予測し、実行で確認する"
          - type: "applied"
            theme: "割り勘計算プログラム（整数除算・剰余・キャストを活用）"
        boss_description: "四則演算・整数除算・型キャストを組み合わせた計算問題"

      - id: "C1-06"
        name: "標準入力（Scanner）"
        folder: "C1-06_scanner-input"
        skill: "入出力制御"
        min_java_version: null
        prerequisites: ["C1-04", "C1-05"]
        exp_required: 60
        learning_goals:
          - "Scannerクラスでキーボードから入力を受け取れる"
          - "nextInt, nextDouble, nextLine の使い分けを理解する"
          - "入力と出力を組み合わせた対話的プログラムが書ける"
        lecture_topics:
          - "java.util.Scannerのimportと生成"
          - "nextInt(), nextDouble(), nextLine() の違い"
          - "nextInt()の後のnextLine()問題（改行の食い残し）"
          - "入力→処理→出力のパターン"
        exercise_hints:
          - type: "basic"
            theme: "名前と年齢を入力して挨拶メッセージを出力する"
          - type: "applied"
            theme: "複数の数値を入力して平均値を計算・出力する対話型プログラム"
        boss_description: "Scannerの各メソッドを使い分け、入力→計算→出力を組み合わせた総合問題"

  # ============================================================
  # エリア2: 分岐の森（制御構文）
  # ============================================================
  - id: "branching-forest"
    name: "分岐の森"
    order: 2
    exp_exercise:
      min: 15
      max: 25
    exp_boss:
      min: 25
      max: 40
    dungeons:

      - id: "C1-07"
        name: "if / else"
        folder: "C1-07_if-else"
        skill: "条件分岐"
        min_java_version: null
        prerequisites: ["C1-06"]
        exp_required: 60
        learning_goals:
          - "if文で条件に応じた処理の分岐ができる"
          - "if-else, if-else if-else の多段分岐を書ける"
          - "条件式の評価（trueまたはfalse）を理解する"
        lecture_topics:
          - "if文の基本構文"
          - "if-else（二択の分岐）"
          - "if-else if-else（多段の分岐）"
          - "条件式とboolean値の関係"
          - "ブロック省略の危険性（1行if）"
        exercise_hints:
          - type: "basic"
            theme: "入力された点数に応じて合否を判定するプログラム"
          - type: "applied"
            theme: "入力された数値をもとにランク（A/B/C/D）を判定するプログラム"
        boss_description: "複数条件のif-else分岐を正しく設計・実装できることを問う総合問題"

      - id: "C1-08"
        name: "比較・論理演算子"
        folder: "C1-08_comparison-logic"
        skill: "論理構築"
        min_java_version: null
        prerequisites: ["C1-07"]
        exp_required: 60
        learning_goals:
          - "比較演算子（==, !=, <, >, <=, >=）を正しく使える"
          - "論理演算子（&&, ||, !）で複合条件を組み立てられる"
          - "文字列比較で==ではなくequals()を使う理由を理解する"
        lecture_topics:
          - "比較演算子一覧と使い方"
          - "==とequals()の違い（プリミティブ型 vs 参照型）"
          - "論理演算子（AND, OR, NOT）"
          - "短絡評価（ショートサーキット）"
          - "複合条件の組み立て方と括弧の重要性"
        exercise_hints:
          - type: "basic"
            theme: "年齢と会員ステータスに応じた料金判定プログラム"
          - type: "applied"
            theme: "うるう年判定プログラム（複合条件の実践）"
        boss_description: "比較・論理演算子を組み合わせた複合条件判定の総合問題"

      - id: "C1-09"
        name: "switch文・式"
        folder: "C1-09_switch"
        skill: "多分岐制御"
        min_java_version: null
        prerequisites: ["C1-07"]
        exp_required: 60
        learning_goals:
          - "switch文で多分岐処理を書ける"
          - "break文の役割とfall-through（貫通）を理解する"
          - "switch式（Java 14以降）の存在と利点を知る"
        lecture_topics:
          - "switch文の基本構文（case, break, default）"
          - "fall-through（breakを忘れた場合の挙動）"
          - "switchで使える型（int, String, enum等）"
          - "switch式（Java 14以降）— アロー構文と値を返すswitch"
        exercise_hints:
          - type: "basic"
            theme: "曜日番号から曜日名を出力するプログラム"
          - type: "applied"
            theme: "月番号からその月の日数を返すプログラム（うるう年対応）"
        boss_description: "switch文/式の正しい使い方とfall-through理解を問う総合問題"

      - id: "C1-10"
        name: "for文"
        folder: "C1-10_for-loop"
        skill: "反復処理"
        min_java_version: null
        prerequisites: ["C1-08"]
        exp_required: 75
        learning_goals:
          - "for文の3つの構成要素（初期化・条件・更新）を理解する"
          - "指定回数の繰り返し処理が書ける"
          - "ループカウンタを活用した処理ができる"
        lecture_topics:
          - "for文の基本構文（初期化; 条件; 更新）"
          - "ループカウンタの使い方（0始まり vs 1始まり）"
          - "ループの実行フロー（初期化→条件判定→本体→更新の繰り返し）"
          - "累積（合計、カウント）パターン"
        exercise_hints:
          - type: "basic"
            theme: "1からNまでの合計を計算するプログラム"
          - type: "applied"
            theme: "九九の表を整形出力するプログラム"
        boss_description: "for文のカウンタ制御と累積処理を組み合わせた総合問題"

      - id: "C1-11"
        name: "while / do-while"
        folder: "C1-11_while-loop"
        skill: "条件反復"
        min_java_version: null
        prerequisites: ["C1-10"]
        exp_required: 75
        learning_goals:
          - "while文で条件ベースの繰り返しが書ける"
          - "do-while文との違い（最低1回実行）を理解する"
          - "無限ループの作り方と脱出方法を理解する"
        lecture_topics:
          - "while文の基本構文と実行フロー"
          - "do-while文 — 必ず1回は実行される"
          - "forとwhileの使い分け（回数がわかるか/条件で終わるか）"
          - "無限ループ（while(true)）とbreakによる脱出"
          - "入力を繰り返し受け付ける対話パターン"
        exercise_hints:
          - type: "basic"
            theme: "入力された数値が0になるまで合計し続けるプログラム"
          - type: "applied"
            theme: "数当てゲーム（ランダムな数を当てるまでループ）"
        boss_description: "while/do-whileを使い分けた条件制御ループの総合問題"

      - id: "C1-12"
        name: "ネスト・break・continue"
        folder: "C1-12_nest-break-continue"
        skill: "フロー制御"
        min_java_version: null
        prerequisites: ["C1-11"]
        exp_required: 75
        learning_goals:
          - "ループのネスト（二重ループ）を正しく書ける"
          - "breakとcontinueの動作の違いを理解する"
          - "ラベル付きbreakの使い方を知る"
        lecture_topics:
          - "二重ループの構造と実行フロー"
          - "break — ループを完全に抜ける"
          - "continue — 現在のイテレーションをスキップ"
          - "ラベル付きbreak（外側ループを抜ける）"
          - "ネストが深くなりすぎない設計のコツ"
        exercise_hints:
          - type: "basic"
            theme: "二重ループで三角形の星印パターンを出力する"
          - type: "applied"
            theme: "素数判定プログラム（breakの活用）"
        boss_description: "ネスト・break・continueを正しく使い分けるフロー制御の総合問題"

# ============================================================
# 職業定義（MVP範囲）
# ============================================================
jobs:
  basic:
    - id: "swordsman"
      name: "剣士"
      category: "言語コア"
      required_skills:
        - "基本構文"       # C1-01
        - "出力操作"       # C1-02
        - "数値型操作"     # C1-03
        - "文字列型操作"   # C1-04
        - "演算処理"       # C1-05
        - "入出力制御"     # C1-06

    - id: "martial-artist"
      name: "武闘家"
      category: "言語コア"
      required_skills:
        - "条件分岐"       # C1-07
        - "論理構築"       # C1-08
        - "多分岐制御"     # C1-09
        - "反復処理"       # C1-10
        - "条件反復"       # C1-11
        - "フロー制御"     # C1-12

  advanced:
    - id: "battle-master"
      name: "バトルマスター"
      prerequisites:
        - "swordsman"
        - "martial-artist"
      description: "Java基本構文を自在に操る"

# ============================================================
# プレイヤーレベルテーブル（MVP範囲: Lv1〜5）
# ============================================================
levels:
  - level: 1
    title: "かけだし冒険者"
    total_exp: 0
    exp_to_next: 100
  - level: 2
    title: "見習いプログラマ"
    total_exp: 100
    exp_to_next: 150
  - level: 3
    title: "一人前の書き手"
    total_exp: 250
    exp_to_next: 200
  - level: 4
    title: "条件の見極め人"
    total_exp: 450
    exp_to_next: 250
  - level: 5
    title: "ループの旅人"
    total_exp: 700
    exp_to_next: null  # MVPではここが上限
