  <!-- ============================================================ -->
  <!-- Subtitle: "[ ADVENTURE IN JAVA ]" - bitmap pixel=2            -->
  <!-- Start at x=290, y=128. char advance = 12 (5+1)*2              -->
  <!-- Color: #006633 (dim phosphor)                                 -->
  <!-- ============================================================ -->

  <!-- "[ ADVENTURE-IN-JAVA ]" rendered using monospace text in pixel-style  -->
  <!-- For brevity, use SVG text with monospace font sized to match pixel grid -->
  <text x="290" y="142"
        font-family="ui-monospace, 'Menlo', 'Consolas', monospace"
        font-size="14" font-weight="700"
        fill="#006633" letter-spacing="2">[ ADVENTURE  IN  JAVA ]</text>

  <!-- ============================================================ -->
  <!-- System status line (bottom): mock CLI output                  -->
  <!-- ============================================================ -->
  <text x="290" y="180"
        font-family="ui-monospace, 'Menlo', 'Consolas', monospace"
        font-size="11" fill="#00FF66" opacity="0.65">
    <tspan x="290" dy="0">[OK] curriculum.cache loaded</tspan>
    <tspan x="290" dy="14">[OK] guild.api  connected</tspan>
  </text>

