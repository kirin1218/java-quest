<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-label="java-quest logo (grayscale pixel-art CRT terminal style)" shape-rendering="crispEdges">
  <title>java-quest</title>
  <desc>Pixel-art / CRT terminal style logo in grayscale. Sword + shield emblem on left, "&gt; JAVA-QUEST_" bitmap wordmark on right, with shadow-mask dot overlay for enhanced pixel feel.</desc>

  <!-- ============================================================ -->
  <!-- Defs: dot-mask pattern + pixel-gap pattern                   -->
  <!-- ============================================================ -->
  <defs>
    <!-- Shadow-mask: tiny black dot every 2px creates phosphor-pixel feel -->
    <pattern id="dotmask" x="0" y="0" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#000000"/>
    </pattern>

    <!-- Pixel-gap grid for emblem (6px cell): 1px dark gutters every 6px -->
    <pattern id="gap6" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="6" height="1" fill="#000000"/>
      <rect x="0" y="0" width="1" height="6" fill="#000000"/>
    </pattern>

    <!-- Pixel-gap grid for wordmark (4px cell): 1px dark gutters every 4px -->
    <pattern id="gap4" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="1" fill="#000000"/>
      <rect x="0" y="0" width="1" height="4" fill="#000000"/>
    </pattern>
  </defs>

  <!-- ============================================================ -->
  <!-- Background (CRT phosphor, grayscale)                         -->
  <!-- ============================================================ -->
  <rect x="0" y="0" width="640" height="220" fill="#0A0A0A"/>

  <!-- Outer frame (bright gray) -->
  <rect x="0" y="0" width="640" height="6" fill="#D8D8D8"/>
  <rect x="0" y="214" width="640" height="6" fill="#D8D8D8"/>
  <rect x="0" y="0" width="6" height="220" fill="#D8D8D8"/>
  <rect x="634" y="0" width="6" height="220" fill="#D8D8D8"/>

  <!-- Inner soft border (dim) -->
  <rect x="6" y="6" width="628" height="2" fill="#262626"/>
  <rect x="6" y="212" width="628" height="2" fill="#262626"/>

  <!-- ============================================================ -->
  <!-- EMBLEM (pixel = 6, cols 12-32, rows 3-26)                    -->
  <!-- ============================================================ -->

  <!-- ── Shield (drawn first, sword overlays) ── -->
  <!-- Grayscale: outline #D8D8D8, fill #2C2C2C, boss-accent #595959 -->

  <!-- Row 7 -->
  <rect x="96"  y="42" width="6" height="6" fill="#D8D8D8"/>
  <rect x="102" y="42" width="66" height="6" fill="#2C2C2C"/>
  <rect x="168" y="42" width="6" height="6" fill="#D8D8D8"/>

  <!-- Row 8 -->
  <rect x="90"  y="48" width="6" height="6" fill="#D8D8D8"/>
  <rect x="96"  y="48" width="78" height="6" fill="#2C2C2C"/>
  <rect x="174" y="48" width="6" height="6" fill="#D8D8D8"/>

  <!-- Row 9 -->
  <rect x="84"  y="54" width="6" height="6" fill="#D8D8D8"/>
  <rect x="90"  y="54" width="90" height="6" fill="#2C2C2C"/>
  <rect x="180" y="54" width="6" height="6" fill="#D8D8D8"/>

  <!-- Rows 10-19: full body -->
  <rect x="84"  y="60" width="6" height="60" fill="#D8D8D8"/>
  <rect x="90"  y="60" width="90" height="60" fill="#2C2C2C"/>
  <rect x="180" y="60" width="6" height="60" fill="#D8D8D8"/>

  <!-- Row 20 -->
  <rect x="90"  y="120" width="6" height="6" fill="#D8D8D8"/>
  <rect x="96"  y="120" width="78" height="6" fill="#2C2C2C"/>
  <rect x="174" y="120" width="6" height="6" fill="#D8D8D8"/>

  <!-- Row 21 -->
  <rect x="96"  y="126" width="6" height="6" fill="#D8D8D8"/>
  <rect x="102" y="126" width="66" height="6" fill="#2C2C2C"/>
  <rect x="168" y="126" width="6" height="6" fill="#D8D8D8"/>

  <!-- Row 22 -->
