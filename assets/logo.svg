  <rect x="108" y="132" width="54" height="6" fill="#2C2C2C"/>
  <rect x="162" y="132" width="6" height="6" fill="#D8D8D8"/>

  <!-- Row 23 -->
  <rect x="114" y="138" width="6" height="6" fill="#D8D8D8"/>
  <rect x="120" y="138" width="30" height="6" fill="#2C2C2C"/>
  <rect x="150" y="138" width="6" height="6" fill="#D8D8D8"/>

