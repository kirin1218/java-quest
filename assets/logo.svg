  <rect x="126" y="78" width="18" height="6" fill="#595959"/>
  <rect x="120" y="84" width="30" height="6" fill="#595959"/>
  <rect x="120" y="90" width="30" height="6" fill="#595959"/>
  <rect x="126" y="96" width="18" height="6" fill="#595959"/>

  <!-- ── Sword (overlays shield) ── -->
  <!-- Grayscale: blade-highlight #F2F2F2, blade-edge #A8A8A8, guard #BFBFBF, guard-shadow #4D4D4D, grip #404040, pommel #C8C8C8 -->

  <!-- Row 3: tip -->
  <rect x="132" y="18" width="6" height="6" fill="#F2F2F2"/>

  <!-- Row 4 -->
  <rect x="132" y="24" width="6" height="6" fill="#F2F2F2"/>

  <!-- Rows 5-17: blade (3 wide, 13 rows) -->
  <rect x="126" y="30" width="6" height="78" fill="#A8A8A8"/>
  <rect x="132" y="30" width="6" height="78" fill="#F2F2F2"/>
  <rect x="138" y="30" width="6" height="78" fill="#A8A8A8"/>

  <!-- Row 18: guard wide -->
  <rect x="96" y="108" width="78" height="6" fill="#BFBFBF"/>
  <!-- Row 19: guard with shadow caps -->
  <rect x="96"  y="114" width="6"  height="6" fill="#4D4D4D"/>
  <rect x="102" y="114" width="66" height="6" fill="#BFBFBF"/>
